apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: mlops-prod
  labels:
    app: recommendation
spec:
  type: ClusterIP
  selector:
    app: recommendation
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 8001
    targetPort: 8001
    protocol: TCP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: feature-store-service
  namespace: mlops-prod
  labels:
    app: feature-store
spec:
  type: ClusterIP
  selector:
    app: feature-store
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: model-registry-service
  namespace: mlops-prod
  labels:
    app: model-registry
spec:
  type: ClusterIP
  selector:
    app: model-registry
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    protocol: TCP
